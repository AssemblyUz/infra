name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - deploy/frontend/image.txt
      - compose.yaml
      - docker-compose.prod.yml
      - Caddyfile.template
      - scripts/**
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:
    inputs:
      image:
        description: Frontend image to deploy. Defaults to deploy/frontend/image.txt.
        required: false

concurrency:
  group: production-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra
        uses: actions/checkout@v6

      - name: Resolve image
        id: image
        env:
          INPUT_IMAGE: ${{ inputs.image }}
        run: |
          image="${INPUT_IMAGE:-}"
          if [ -z "$image" ]; then
            image="$(tr -d '[:space:]' < deploy/frontend/image.txt)"
          fi
          if [ -z "$image" ]; then
            echo "Frontend image is empty." >&2
            exit 1
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync infra files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar -czf infra.tar.gz compose.yaml docker-compose.prod.yml Caddyfile.template scripts README.md .env.example deploy
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "sudo mkdir -p /opt/assembly/infra && sudo chown -R '$VPS_USER:$VPS_USER' /opt/assembly"
          scp -P "$VPS_PORT" infra.tar.gz "$VPS_USER@$VPS_HOST:/tmp/assembly-infra.tar.gz"
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "tar -xzf /tmp/assembly-infra.tar.gz -C /opt/assembly/infra && chmod +x /opt/assembly/infra/scripts/*.sh"

      - name: Log in to GHCR on server if configured
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -z "$GHCR_USERNAME" ] || [ -z "$GHCR_READ_TOKEN" ]; then
            echo "GHCR credentials are not set; assuming images are public."
            exit 0
          fi
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "if docker info >/dev/null 2>&1; then DOCKER=docker; else DOCKER='sudo docker'; fi; echo '$GHCR_READ_TOKEN' | \$DOCKER login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy frontend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash /opt/assembly/infra/scripts/deploy-service.sh frontend '$IMAGE'"

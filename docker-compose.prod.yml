name: assembly

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 128mb
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=30
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assembly}
      POSTGRES_USER: ${POSTGRES_USER:-assembly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in /opt/assembly/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/assemblyuz/backend:latest}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/opt/assembly/.env}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-assembly}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-assembly}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-30}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os; os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings'); import django; django.setup(); from django.db import connection; cursor = connection.cursor(); cursor.execute('SELECT 1')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/assemblyuz/frontend:latest}
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://api:8000}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/opt/assembly/.env}
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
